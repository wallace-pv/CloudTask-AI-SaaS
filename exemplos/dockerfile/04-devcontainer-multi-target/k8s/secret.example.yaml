# =============================================================================
# EXEMPLO de Secret. Nunca commite o Secret REAL com valores em base64.
# Crie no cluster com:
#
#   kubectl create secret generic cloudtask-secrets \
#     --namespace cloudtask \
#     --from-literal=DATABASE_URL='postgresql+psycopg2://USER:PASS@HOST:5432/DB' \
#     --from-literal=SECRET_KEY='gerar-com-secrets.token_urlsafe(32)' \
#     --from-literal=AWS_REGION='us-east-1' \
#     --from-literal=S3_BUCKET_NAME='cloudtask-uploads'
#
# Em produção real, prefira AWS Secrets Manager + External Secrets Operator.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cloudtask-secrets
  namespace: cloudtask
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg2://USER:PASS@HOST:5432/DB"
  SECRET_KEY: "TROQUE-ESTE-VALOR"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "cloudtask-uploads"
