# =============================================================================
# Deployment para EKS — usa a imagem `prod` publicada no ECR pelo CI.
# -----------------------------------------------------------------------------
# Aplique depois de:
#   1. CI ter empurrado a imagem para o ECR (ver .github/workflows/ci.yml).
#   2. Ter o cluster EKS configurado (`aws eks update-kubeconfig ...`).
#   3. Substituir <ACCOUNT_ID> e <REGION> abaixo.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudtask-api
  namespace: cloudtask
  labels:
    app: cloudtask-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cloudtask-api
  template:
    metadata:
      labels:
        app: cloudtask-api
    spec:
      # Pull da imagem do ECR — o EKS já vem com permissão se o nó tiver a role apropriada.
      containers:
        - name: api
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/cloudtask-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: APP_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: INFO
          envFrom:
            - secretRef:
                name: cloudtask-secrets    # contém DATABASE_URL, SECRET_KEY, etc.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          # Segurança: sem root, sem privilege escalation, FS somente leitura.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
