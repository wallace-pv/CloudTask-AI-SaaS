# =============================================================================
# docker-compose.prod.yml — OVERRIDE de produção (simulação local)
# -----------------------------------------------------------------------------
# Em produção real o deploy é no EKS via manifests (Aula 8). Este arquivo
# existe apenas para o aluno verificar localmente que a imagem `prod` sobe
# limpa, sem ferramentas de dev nem código montado por volume.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# IMPORTANTE: as tags `!reset` exigem Docker Compose v2.24+ (ano 2024).
# Verifique com `docker compose version`. Em versões mais antigas, troque por
# uma versão "standalone" deste arquivo, sem override.
# =============================================================================

services:

  api:
    build:
      target: prod                        # imagem enxuta, sem debugpy/ruff
    image: cloudtask-api:prod
    container_name: cloudtask-api-prod
    # Tags customizadas do Compose v2.24+:
    #   `!reset` zera o valor herdado do base.
    #   `!override` SUBSTITUI o valor herdado (em vez de mesclar listas).
    # Sem isso, listas como volumes/ports do base seriam MESCLADAS, e a
    # imagem prod herdaria o bind mount do código (defeito grave).
    ports: !override
      - "${APP_PORT:-8000}:8000"
    volumes: !reset null
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: always

  db:
    # Em "produção" (mesmo simulada) o banco NÃO deve ficar exposto na rede.
    # `!reset null` remove o mapeamento de porta herdado do base — o Postgres
    # fica acessível apenas internamente, pela rede do Compose.
    # RISCO de expor: qualquer um na rede do host poderia tentar conectar no DB.
    ports: !reset null
    restart: always
