# =============================================================================
# secret.example.yaml — TEMPLATE para o Secret real.
# -----------------------------------------------------------------------------
# COPIE para `secret.yaml` (gitignored) e preencha com valores reais. NÃO
# commite o arquivo com senhas verdadeiras.
#
# Como gerar os campos base64 (zsh do devcontainer):
#   echo -n 'cloudtask' | base64                # POSTGRES_USER
#   SENHA=$(openssl rand -hex 16)
#   echo -n "$SENHA"                            # POSTGRES_PASSWORD para URL
#   echo -n "$SENHA" | base64  # POSTGRES_PASSWORD
#   openssl rand -hex 32 | tr -d '\n' | base64  # SECRET_KEY
#
# DATABASE_URL é montada a partir do user, senha, host e db:
#   url="postgresql://cloudtask:${SENHA}@postgres:5432/cloudtask"
#   echo -n "$url" | base64
#
# RISCO de Secret no K8s: o objeto Secret é apenas base64 (NÃO criptografia).
# Quem tiver acesso `get secret` no namespace lê o valor decodificado. Em
# produção real, ative criptografia at-rest (etcd) e/ou troque por
# AWS Secrets Manager + ExternalSecrets Operator (ver §8 da prática 09).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cloudtask-secrets
  namespace: cloudtask
type: Opaque
data:
  # SUBSTITUA pelos valores base64. Exemplo aqui é "cloudtask"/"trocar-me"/etc.
  POSTGRES_USER: "Y2xvdWR0YXNr" # cloudtask
  POSTGRES_PASSWORD: "dHJvY2FyLW1lLWFudGVzLWRlLXVzYXI=" # trocar-me-antes-de-usar
  SECRET_KEY: "ZGV2LW9ubHktdHJvY2FyLW1lLWFudGVzLXBkLXNlY3JldA==" # dev-only-trocar-me-antes-pd-secret
  DATABASE_URL: "cG9zdGdyZXNxbDovL2Nsb3VkdGFzazp0cm9jYXItbWUtYW50ZXMtZGUtdXNhckBwb3N0Z3Jlczo1NDMyL2Nsb3VkdGFzaw==" # postgresql://cloudtask:trocar-me-antes-de-usar@postgres:5432/cloudtask
