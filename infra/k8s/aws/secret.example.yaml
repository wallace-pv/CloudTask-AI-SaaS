# =============================================================================
# secret.example.yaml (AWS/EKS) — TEMPLATE do Secret para o deploy na nuvem.
# -----------------------------------------------------------------------------
# Igual ao secret.example.yaml local: COPIE para `secret.yaml` (gitignored) e
# preencha com valores reais em base64. NUNCA commite senhas verdadeiras.
#
# Gerar os campos base64 (terminal do devcontainer):
#   echo -n 'cloudtask' | base64                # POSTGRES_USER
#   SENHA=$(openssl rand -hex 16)
#   echo -n "$SENHA"                            # POSTGRES_PASSWORD para URL
#   echo -n "$SENHA" | base64  # POSTGRES_PASSWORD
#   openssl rand -hex 32 | tr -d '\n' | base64  # SECRET_KEY
#   url="postgresql://cloudtask:${SENHA}@postgres:5432/cloudtask"
#   echo -n "$url" | base64                     # DATABASE_URL
#
# ATENÇÃO na nuvem: Secret do K8s é apenas base64 (NÃO criptografia). No EKS,
# o jeito profissional é AWS Secrets Manager + External Secrets Operator, ou
# habilitar criptografia de Secrets do EKS com KMS. Para a aula, o Secret
# simples basta — mas explique a limitação ao aluno.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cloudtask-secrets
  namespace: cloudtask
type: Opaque
data:
  # SUBSTITUA todos os valores. Estes são exemplos NÃO seguros.
  POSTGRES_USER: "Y2xvdWR0YXNr" # cloudtask
  POSTGRES_PASSWORD: "dHJvY2FyLW1lLWFudGVzLWRlLXVzYXI=" # trocar-me-antes-de-usar
  SECRET_KEY: "ZGV2LW9ubHktdHJvY2FyLW1lLWFudGVzLXBkLXNlY3JldA==" # dev-only-trocar-me-antes-pd-secret
  DATABASE_URL: "cG9zdGdyZXNxbDovL2Nsb3VkdGFzazp0cm9jYXItbWUtYW50ZXMtZGUtdXNhckBwb3N0Z3Jlczo1NDMyL2Nsb3VkdGFzaw==" # postgresql://cloudtask:trocar-me-antes-de-usar@postgres:5432/cloudtask
